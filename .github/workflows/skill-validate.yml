---
name: Skill Validate
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Skills
        run: gh skill publish --dry-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
